<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Voyager 数据管理器</title>
    <!-- 引入 marked.js 用于完整 Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 定义基础/明亮模式变量 */
        :root {
            --bg-color: #f8f9fa;
            --surface: #ffffff;
            --border: #e0e0e0;
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --success: #137333;
            --text-main: #202124;
            --text-secondary: #5f6368;
            --hover-bg: #f1f3f4;
            --selected-bg: #e8f0fe;
            --shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);

            /* 元数据(JSON)亮色主题代码高亮 */
            --meta-bg: #f8f9fa;
            --meta-text: #202124;
            --meta-key: #005cc5;
            --meta-string: #032f62;
            --meta-number: #005cc5;
            --meta-boolean: #d73a49;
        }

        /* 定义暗黑模式变量 */
        [data-theme="dark"] {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --border: #3c4043;
            --primary: #8ab4f8;
            --primary-light: rgba(138, 180, 248, 0.15);
            --success: #81c995;
            --text-main: #e8eaed;
            --text-secondary: #9aa0a6;
            --hover-bg: #28292c;
            --selected-bg: rgba(138, 180, 248, 0.12);
            --shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.5), 0 1px 3px 1px rgba(0, 0, 0, 0.3);

            /* 元数据(JSON)暗色主题代码高亮 (VSCode风格) */
            --meta-bg: #1e1e1e;
            --meta-text: #d4d4d4;
            --meta-key: #9cdcfe;
            --meta-string: #ce9178;
            --meta-number: #b5cea8;
            --meta-boolean: #569cd6;
        }

        /* 全局优雅滚动条优化 (包含左侧目录和右侧内容区) */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header */
        header {
            background: var(--surface);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            z-index: 10;
            transition: background-color 0.3s;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 修改为Flex布局以容纳切换按钮 */

        .btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            filter: brightness(0.9);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--hover-bg);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            filter: brightness(0.9);
        }

        input[type="file"] {
            display: none;
        }

        .search-box {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 300px;
            font-size: 14px;
            outline: none;
            background: var(--surface);
            color: var(--text-main);
            transition: all 0.2s;
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--hover-bg);
        }

        /* Header Selection Badge */
        .header-selection-badge {
            background: var(--surface);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            height: 34px;
        }

        .badge-text {
            font-weight: 500;
        }

        .badge-text span {
            color: var(--primary);
            font-weight: 600;
        }

        .badge-divider {
            color: var(--border);
            margin: 0 4px;
        }

        .btn-clear {
            padding: 4px 8px;
            font-size: 12px;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .btn-clear:not(:disabled):hover {
            background: var(--border);
            color: var(--text-main);
        }

        .btn-clear:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Main Layout */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar (Folder Tree) */
        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px 12px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .tree-node {
            position: relative;
        }

        .tree-children {
            margin-left: 11px;
            padding-left: 12px;
            border-left: 1px solid var(--border);
            transition: border-color 0.3s;
        }

        .tree-children>.tree-node::before {
            content: '';
            position: absolute;
            top: 16px;
            left: -12px;
            width: 10px;
            height: 1px;
            background-color: var(--border);
            transition: background-color 0.3s;
        }

        .tree-item {
            padding: 6px 8px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 14px;
            color: var(--text-main);
            user-select: none;
            transition: background-color 0.1s, color 0.3s;
        }

        .tree-item-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow: hidden;
        }

        .tree-item-content .item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-item:hover {
            background: var(--hover-bg);
        }

        .tree-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 500;
        }

        .tree-icon {
            color: #fbbc04;
            flex-shrink: 0;
        }

        /* Sidebar Action Buttons */
        .tree-item-actions {
            display: none;
            gap: 2px;
            flex-shrink: 0;
        }

        .tree-item:hover .tree-item-actions {
            display: flex;
        }

        .tree-action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .tree-action-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* Left Sidebar Drop Target Highlight */
        .tree-item.drag-over {
            background: var(--primary-light);
            color: var(--primary);
            outline: 2px dashed var(--primary);
            outline-offset: -2px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* Breadcrumb & Navigation */
        .breadcrumb-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-buttons {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--hover-bg);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .breadcrumb {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* --- 核心修改 1/3：新增面包屑旁的统计文本样式 --- */
        .breadcrumb-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 8px;
            font-weight: normal;
            transition: color 0.3s ease;
        }

        /* Grid/List View */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .item-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            user-select: none;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .item-card:hover {
            box-shadow: var(--shadow);
            border-color: transparent;
        }

        .item-card.drag-over {
            border: 2px dashed var(--primary);
            background-color: var(--primary-light);
        }

        .item-card.selected {
            background-color: var(--selected-bg);
            border-color: var(--primary);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .item-icon {
            font-size: 44px;
            cursor: pointer;
            display: inline-block;
            line-height: 1;
            user-select: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
        }

        .item-icon:hover {
            transform: scale(1.15);
        }

        .item-icon.folder {
            color: #fbbc04;
        }

        .item-icon.folder:hover {
            filter: drop-shadow(0px 4px 12px rgba(251, 188, 4, 0.6));
        }

        .item-icon.file {
            color: #4285f4;
        }

        .item-icon.file:hover {
            filter: drop-shadow(0px 4px 12px rgba(66, 133, 244, 0.6));
        }

        /* Title and Icons */
        .item-title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 6px;
        }

        .item-title {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-all;
            flex: 1;
            color: var(--text-main);
        }

        .icon-group {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .action-icon {
            text-decoration: none;
            font-size: 13px;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.6;
            background-color: transparent;
            border: none;
            color: var(--text-main);
            transition: background-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, color 0.3s ease;
        }

        .action-icon:hover {
            opacity: 1;
            background-color: var(--border);
            transform: scale(1.05);
        }

        .item-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-path {
            font-size: 11px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background-color: var(--hover-bg);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
            max-width: 100%;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .checkbox-wrapper {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Context Menu & Modals */
        #context-menu {
            display: none;
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 6px;
            padding: 6px 0;
            min-width: 160px;
            z-index: 1000;
        }

        .context-menu-item {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-main);
        }

        .context-menu-item:hover {
            background: var(--hover-bg);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--surface);
            padding: 24px;
            border-radius: 8px;
            width: 400px;
            max-width: 90vw;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        .modal h3 {
            margin-bottom: 16px;
        }

        .modal select {
            width: 100%;
            padding: 8px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-color);
            color: var(--text-main);
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }

        /* Meta Viewer Modal overrides */
        .meta-modal {
            width: 600px;
            max-height: 80vh;
        }

        .meta-content-wrapper {
            background: var(--meta-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            overflow-y: auto;
            flex: 1;
            transition: background-color 0.3s;
        }

        .meta-content-wrapper pre {
            margin: 0;
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 13px;
            color: var(--meta-text);
        }

        .meta-key {
            color: var(--meta-key);
        }

        .meta-string {
            color: var(--meta-string);
        }

        .meta-number {
            color: var(--meta-number);
        }

        .meta-boolean {
            color: var(--meta-boolean);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Chat Import Status Indicator */
        .chat-import-btn {
            position: relative;
        }

        .chat-import-btn.imported {
            opacity: 1 !important;
        }

        .chat-import-btn.imported::after {
            content: '';
            position: absolute;
            top: -1px;
            right: -1px;
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: 50%;
            border: 1px solid var(--surface);
        }

        .chat-import-btn.not-imported {
            opacity: 0.4;
        }

        /* Chat Select Modal */
        .chat-select-modal {
            width: 520px;
            max-height: 80vh;
        }

        .chat-select-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .chat-select-item {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            transition: background 0.15s;
        }

        .chat-select-item:last-child {
            border-bottom: none;
        }

        .chat-select-item:hover {
            background: var(--hover-bg);
        }

        .chat-select-item .chat-type-badge {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--primary-light);
            color: var(--primary);
            flex-shrink: 0;
        }

        .chat-select-search {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            background: var(--surface);
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        .chat-select-search:focus {
            border-color: var(--primary);
        }

        /* Chat Viewer Modal */
        .chat-viewer-modal {
            width: 750px;
            max-width: 95vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .chat-viewer-header {
            margin-bottom: 12px;
        }

        .chat-viewer-header h3 {
            margin-bottom: 4px;
            font-size: 18px;
        }

        .chat-viewer-meta {
            color: var(--text-secondary);
            font-size: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-viewer-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .chat-turn-divider {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            padding: 12px 0 4px;
            font-weight: 500;
        }

        .chat-bubble-row {
            display: flex;
            gap: 10px;
            margin: 4px 0;
        }

        .chat-bubble-row.user {
            flex-direction: row-reverse;
        }

        .chat-bubble-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            line-height: 1;
        }

        .chat-bubble-row.user .chat-bubble-avatar {
            background: var(--primary-light);
        }

        .chat-bubble-row.assistant .chat-bubble-avatar {
            background: var(--hover-bg);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .chat-bubble-row.user .chat-bubble {
            background: var(--primary);
            color: #fff;
            border-top-right-radius: 4px;
        }

        .chat-bubble-row.assistant .chat-bubble {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .chat-bubble h1,
        .chat-bubble h2,
        .chat-bubble h3,
        .chat-bubble h4 {
            margin: 10px 0 6px;
        }

        .chat-bubble h1 {
            font-size: 18px;
        }

        .chat-bubble h2 {
            font-size: 16px;
        }

        .chat-bubble h3 {
            font-size: 15px;
        }

        .chat-bubble p {
            margin: 4px 0;
        }

        .chat-bubble ul,
        .chat-bubble ol {
            padding-left: 20px;
            margin: 4px 0;
        }

        .chat-bubble code {
            background: rgba(0, 0, 0, 0.08);
            padding: 1px 4px;
            border-radius: 3px;
            font-family: Consolas, monospace;
            font-size: 13px;
        }

        .chat-bubble pre {
            background: rgba(0, 0, 0, 0.06);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
        }

        .chat-bubble pre code {
            background: transparent;
            padding: 0;
        }

        .chat-bubble-row.user .chat-bubble code {
            background: rgba(255, 255, 255, 0.18);
        }

        .chat-bubble-row.user .chat-bubble pre {
            background: rgba(255, 255, 255, 0.12);
        }

        .chat-bubble img {
            max-width: 100%;
            border-radius: 6px;
            margin: 6px 0;
            cursor: pointer;
        }

        .chat-bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 6px 0;
            font-size: 13px;
        }

        .chat-bubble th,
        .chat-bubble td {
            border: 1px solid var(--border);
            padding: 5px 8px;
            text-align: left;
        }

        .chat-bubble th {
            background: var(--hover-bg);
            font-weight: 600;
        }

        .chat-bubble blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 10px;
            margin: 6px 0;
            color: var(--text-secondary);
        }

        .chat-bubble strong {
            font-weight: 600;
        }

        .chat-bubble hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 10px 0;
        }

        .chat-viewer-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            padding: 10px 0 0;
            font-style: italic;
        }

        .chat-viewer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <h2 style="margin-right: 12px;">📁 资源管理器</h2>
            <input type="file" id="fileInput" accept=".json">
            <button class="btn" style="position: relative;" onclick="document.getElementById('fileInput').click()">
                导入 JSON
                <span id="dataTimeDisplay" style="position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); white-space: nowrap; font-weight: normal; display: none;" title="当前数据版本时间"></span>
            </button>
            <button class="btn btn-outline" id="exportBtn" style="display:none;" onclick="exportData()">导出 JSON</button>
            <button class="btn btn-success" id="createRootBtn" style="display:none;"
                onclick="promptCreateFolder(null)">➕ 新建根目录</button>

            <div id="headerSelectionBadge" class="header-selection-badge" style="visibility: hidden;">
                <div class="badge-text">
                    共 <span id="totalFileCount">0</span> 个文件
                    <span class="badge-divider">|</span>
                    已选中 <span id="fileCount">0</span> 个
                </div>
                <button class="btn-clear" id="clearSelectionBtn" onclick="clearSelection()" disabled>清空</button>
            </div>
        </div>
        <div class="header-right">
            <!-- 关联检查状态区 -->
            <div id="assocCheckBadge" class="header-selection-badge" style="cursor: pointer; padding: 6px 12px; gap: 8px; margin-right: 8px; display: none;" onclick="openMissingAssocModal()" title="点击查看详情">
                <span id="assocCheckIcon" style="font-size: 14px;">🟡</span>
                <span class="badge-text" id="assocCheckText">校验中...</span>
            </div>
            
            <input type="text" id="searchInput" class="search-box" placeholder="搜索文件或文件夹...">
            <button class="theme-toggle" id="themeToggleBtn" title="切换深色/浅色主题">🌙</button>
        </div>
    </header>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="empty-state">请先导入数据</div>
        </div>
        <div class="main-content" id="mainArea">
            <div class="breadcrumb-container">
                <div class="nav-buttons">
                    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled title="后退">⬅️</button>
                    <button class="nav-btn" id="btnForward" onclick="goForward()" disabled title="前进">➡️</button>
                </div>
                <div class="breadcrumb">
                    <span id="breadcrumbText">根目录</span>
                    <span id="breadcrumbCount" class="breadcrumb-count"></span>
                </div>
            </div>
            <div class="grid-view" id="contentGrid"></div>
        </div>
    </div>

    <div id="context-menu">
        <div class="context-menu-item" id="contextMoveBtn">移动到文件夹...</div>
    </div>

    <div class="modal-overlay" id="moveModal">
        <div class="modal">
            <h3>移动到...</h3>
            <select id="folderSelect"></select>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('moveModal')">取消</button>
                <button class="btn" onclick="confirmMove()">确定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="metaModal">
        <div class="modal meta-modal">
            <h3>JSON 元数据</h3>
            <div class="meta-content-wrapper">
                <pre><code id="metaContent"></code></pre>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('metaModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- Missing Associations Viewer Modal -->
    <div class="modal-overlay" id="missingAssocModal">
        <div class="modal" style="width: 550px;">
            <h3 style="color: #ea4335;">⚠️ 找不到的关联文件</h3>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:12px;">以下关联在 <code>chat_history</code> 目录中已丢失或被重命名。它们将以红色指示灯显示影响整体完整度。</p>
            <div id="missingAssocList" style="max-height: 250px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 16px;"></div>
            <div class="modal-actions" style="justify-content: space-between;">
                <button class="btn btn-outline" style="color: #ea4335; border-color: #ea4335;" onclick="clearAllMissingAssociations()">清空所有无效关联</button>
                <button class="btn" onclick="closeModal('missingAssocModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- Chat History Select Modal -->
    <div class="modal-overlay" id="chatSelectModal">
        <div class="modal chat-select-modal">
            <h3>📂 选择对话记录</h3>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:12px;">未找到同名匹配，请手动选择
                <code>chat_history</code> 中的对话记录关联到此卡片。选择后将重命名为对话标题。
            </p>
            <input type="text" class="chat-select-search" id="chatSelectSearch" placeholder="搜索对话记录...">
            <div class="chat-select-list" id="chatSelectList"></div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('chatSelectModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- Chat Viewer Modal -->
    <div class="modal-overlay" id="chatViewerModal">
        <div class="modal chat-viewer-modal">
            <div class="chat-viewer-header">
                <h3 id="chatViewerTitle">对话记录</h3>
                <div class="chat-viewer-meta">
                    <span id="chatViewerDate"></span>
                    <span id="chatViewerTurns"></span>
                    <span id="chatViewerSource"></span>
                </div>
            </div>
            <div class="chat-viewer-body" id="chatViewerBody"></div>
            <div class="chat-viewer-footer">📌 此为历史对话记录，仅供查阅，无法继续对话</div>
            <div class="chat-viewer-actions">
                <button class="btn btn-outline" style="font-size:12px;padding:4px 10px;"
                    onclick="removeChatAssociation()">🗑️ 解除关联</button>
                <button class="btn" onclick="closeModal('chatViewerModal')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // --- 主题切换逻辑 ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const savedTheme = localStorage.getItem('gv-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggleBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeToggleBtn.onclick = () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('gv-theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        };

        let store = {
            rawData: null,
            currentFolderId: null,
            searchQuery: '',
            selectedItems: new Set(),
            chatAssociations: {} // 新增对话内容关联数据
        };

        // 初始化时加载已有或本地缓存的关联数据
        function loadChatAssociations() {
            fetch('/api/associations')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        store.chatAssociations = data.data.associations || {};
                        renderMainContent(); // 重新渲染以更新图标状态
                        verifyAssociations(); // 启动后自动检查关联文件是否丢失
                    }
                })
                .catch(err => console.error("加载关联数据失败", err));
        }

        let globalMissingAssociations = [];

        async function verifyAssociations() {
            const badge = document.getElementById('assocCheckBadge');
            const icon = document.getElementById('assocCheckIcon');
            const text = document.getElementById('assocCheckText');
            badge.style.display = 'flex';
            icon.textContent = '🟡';
            text.textContent = '校验关联中...';
            
            try {
                const res = await fetch('/api/associations/verify');
                const data = await res.json();
                if (data.success) {
                    globalMissingAssociations = data.missing;
                    if (data.total === 0) {
                        badge.style.display = 'none';
                    } else if (data.missing.length === 0) {
                        icon.textContent = '🟢';
                        text.innerHTML = `已关联 <span>${data.total}</span> 个`;
                    } else {
                        icon.textContent = '🔴';
                        text.innerHTML = `缺失 <span>${data.missing.length}</span> 个`;
                    }
                } else {
                    icon.textContent = '❌';
                    text.textContent = '校验失败';
                }
            } catch (err) {
                icon.textContent = '⚠️';
                text.textContent = '网络错误';
            }
        }
        
        function openMissingAssocModal() {
            if (!globalMissingAssociations || globalMissingAssociations.length === 0) {
                verifyAssociations(); // 直接点击如果没错就当做刷新
                return;
            }
            const list = document.getElementById('missingAssocList');
            list.innerHTML = '';
            globalMissingAssociations.forEach(m => {
                const el = document.createElement('div');
                el.style.padding = "10px 14px";
                el.style.borderBottom = "1px solid var(--border)";
                el.style.fontSize = "13px";
                
                // 尝试找一下这个ID对应的标题
                let foundTitle = "未知对话标题";
                const contents = getFolderContents();
                for (const fId in contents) {
                    const f = contents[fId].find(file => file.conversationId === m.conversationId);
                    if (f) { foundTitle = f.title; break; }
                }
                
                el.innerHTML = `<div style="font-weight: 500; margin-bottom: 4px;">${escapeHTML(foundTitle)} <span style="font-size: 11px; background: var(--hover-bg); padding: 1px 4px; border-radius: 3px;">ID: ${escapeHTML(m.conversationId)}</span></div>
                                <div style="color: #ea4335;">缺失路径: /chat_history/${escapeHTML(m.folderName)}${m.type === 'file' ? '.md' : ''}</div>`;
                list.appendChild(el);
            });
            document.getElementById('missingAssocModal').style.display = 'flex';
        }
        
        async function clearAllMissingAssociations() {
            if(!confirm(`确定要移除这 ${globalMissingAssociations.length} 条已失效的本机关联记录吗？此操作不可撤销。`)) return;
            
            const btn = document.querySelector('#missingAssocModal .btn-outline');
            btn.textContent = '正在清理...';
            btn.disabled = true;
            
            // 逐个调用 API 删除，之后再拉取
            for (const m of globalMissingAssociations) {
                await fetch(`/api/associations/${m.conversationId}`, { method: 'DELETE' });
                delete store.chatAssociations[m.conversationId];
            }
            
            btn.textContent = '清空所有无效关联';
            btn.disabled = false;
            
            closeModal('missingAssocModal');
            renderMainContent(); // 更新图标
            verifyAssociations(); // 重新检查灯
        }

        // 页面加载时自动加载关联与最新数据
        window.addEventListener('DOMContentLoaded', () => {
            loadChatAssociations();
            fetch('/api/latest-data')
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.data && data.data.format === 'gemini-voyager.folders.v1') {
                        store.rawData = data.data;
                        store.currentFolderId = null;
                        store.selectedItems.clear();

                        navHistory = [null];
                        navIndex = 0;

                        document.getElementById('exportBtn').style.display = 'inline-block';
                        document.getElementById('createRootBtn').style.display = 'inline-block';
                        document.getElementById('headerSelectionBadge').style.visibility = 'visible';
                        
                        updateTotalFileCount();
                        updateSelectionBadge();
                        renderAll();
                        
                        // 移除侧边栏的空白提示
                        const emptyState = document.querySelector('.sidebar .empty-state');
                        if (emptyState) emptyState.style.display = 'none';
                        
                        updateDataTimeDisplay(data.filename);
                    }
                })
                .catch(err => console.log('未自动定位到本地数据', err));
        });

        function updateDataTimeDisplay(filename) {
            const display = document.getElementById('dataTimeDisplay');
            if (!display) return;
            
            // e.g. gemini-voyager-folders-20260324-170714.json
            const match = filename.match(/(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})/);
            if (match) {
                display.textContent = `${match[2]}-${match[3]} ${match[4]}:${match[5]}`;
            } else {
                // 如果没有时间格式，直接显示短文件名
                const shortName = filename.length > 20 ? filename.substring(0, 10) + '...' : filename;
                display.textContent = `${shortName}`;
            }
            display.style.display = 'block';
        }

        let navHistory = [null];
        let navIndex = 0;

        const fileInput = document.getElementById('fileInput');
        const searchInput = document.getElementById('searchInput');
        const sidebar = document.getElementById('sidebar');
        const contentGrid = document.getElementById('contentGrid');
        const breadcrumbText = document.getElementById('breadcrumbText');
        const btnBack = document.getElementById('btnBack');
        const btnForward = document.getElementById('btnForward');

        const headerSelectionBadge = document.getElementById('headerSelectionBadge');
        const totalFileCountSpan = document.getElementById('totalFileCount');
        const fileCountSpan = document.getElementById('fileCount');
        const clearSelectionBtn = document.getElementById('clearSelectionBtn');

        const contextMenu = document.getElementById('context-menu');
        const folderSelect = document.getElementById('folderSelect');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const json = JSON.parse(event.target.result);
                    if (json.format === 'gemini-voyager.folders.v1') {
                        store.rawData = json;
                        store.currentFolderId = null;
                        store.selectedItems.clear();

                        navHistory = [null];
                        navIndex = 0;

                        document.getElementById('exportBtn').style.display = 'inline-block';
                        document.getElementById('createRootBtn').style.display = 'inline-block';
                        headerSelectionBadge.style.visibility = 'visible';
                        
                        updateDataTimeDisplay(file.name);
                        
                        updateTotalFileCount();
                        updateSelectionBadge();
                        renderAll();
                    } else { alert('不支持的 JSON 格式！'); }
                } catch (err) { alert('解析失败：' + err.message); }
            };
            reader.readAsText(file);
        });

        function getFolders() { return store.rawData?.data?.folders || []; }
        function getFolderContents() { return store.rawData?.data?.folderContents || {}; }
        function getChildrenFolders(parentId) { return getFolders().filter(f => f.parentId === parentId).sort((a, b) => (a.sortIndex || 0) - (b.sortIndex || 0)); }
        function getFiles(folderId) { return getFolderContents()[folderId] || []; }
        function getFolderById(id) { return getFolders().find(f => f.id === id); }

        // --- 核心修改 3/3：新增递归统计文件的函数 --- 
        function getRecursiveFileCount(folderId) {
            let count = 0;
            if (folderId === null) {
                // 如果在根目录，加上所有未分配直接归属的文件（防错机制）和特有的根文件集
                count += (getFolderContents()[null] || []).length;
                count += (getFolderContents()['__root_conversations__'] || []).length;
            } else {
                count += getFiles(folderId).length;
            }
            getChildrenFolders(folderId).forEach(sub => {
                count += getRecursiveFileCount(sub.id);
            });
            return count;
        }

        function findSourceId(type, id) {
            if (type === 'folder') return getFolderById(id)?.parentId;
            for (const [fId, files] of Object.entries(getFolderContents())) {
                if (files.some(f => f.conversationId === id)) return fId;
            }
            return null;
        }

        function getFolderPath(folderId) {
            if (!folderId) return '根目录';
            let path = [];
            let currentId = folderId;
            let depth = 0;
            while (currentId && depth < 20) {
                const f = getFolderById(currentId);
                if (f) {
                    path.unshift(f.name);
                    currentId = f.parentId;
                } else break;
                depth++;
            }
            return '根目录 / ' + path.join(' / ');
        }

        function promptCreateFolder(parentId) {
            const title = parentId ? "请输入新建子文件夹的名称：" : "请输入新建根文件夹的名称：";
            const name = prompt(title);
            if (!name || !name.trim()) return;

            const siblings = getChildrenFolders(parentId);
            const maxSortIndex = siblings.reduce((max, f) => Math.max(max, f.sortIndex || 0), -1);

            const newFolder = {
                id: 'folder_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                name: name.trim(),
                parentId: parentId,
                isExpanded: true,
                pinned: false,
                color: "default",
                sortIndex: maxSortIndex + 1,
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            store.rawData.data.folders.push(newFolder);
            store.rawData.data.folderContents[newFolder.id] = [];
            renderAll();
        }

        function reorderFolder(folderId, direction) {
            const folder = getFolderById(folderId);
            if (!folder) return;

            let siblings = getChildrenFolders(folder.parentId);
            const index = siblings.findIndex(f => f.id === folderId);

            if (direction === 'up' && index > 0) {
                [siblings[index - 1], siblings[index]] = [siblings[index], siblings[index - 1]];
            } else if (direction === 'down' && index < siblings.length - 1) {
                [siblings[index], siblings[index + 1]] = [siblings[index + 1], siblings[index]];
            } else {
                return;
            }

            siblings.forEach((f, i) => {
                f.sortIndex = i;
                f.updatedAt = Date.now();
            });

            renderSidebar();
            if (store.currentFolderId === folder.parentId) {
                renderMainContent();
            }
        }

        function navigateToFolder(folderId) {
            // 核心修复：如果是搜索状态，先清空搜索框和状态
            let wasSearching = !!store.searchQuery;
            if (wasSearching) {
                store.searchQuery = '';
                document.getElementById('searchInput').value = '';
            }

            // 如果点击的是当前所在目录，但在搜索中，需要重新渲染以退出搜索视图
            if (store.currentFolderId === folderId) {
                if (wasSearching) renderAll();
                return;
            }

            navHistory = navHistory.slice(0, navIndex + 1);
            navHistory.push(folderId);
            navIndex++;
            store.currentFolderId = folderId;
            renderAll();
        }

        function goBack() {
            if (store.searchQuery) { store.searchQuery = ''; document.getElementById('searchInput').value = ''; }
            if (navIndex > 0) {
                navIndex--;
                store.currentFolderId = navHistory[navIndex];
                renderAll();
            }
        }

        function goForward() {
            if (store.searchQuery) { store.searchQuery = ''; document.getElementById('searchInput').value = ''; }
            if (navIndex < navHistory.length - 1) {
                navIndex++;
                store.currentFolderId = navHistory[navIndex];
                renderAll();
            }
        }

        function updateNavButtons() {
            btnBack.disabled = navIndex === 0;
            btnForward.disabled = navIndex === navHistory.length - 1;
        }

        function updateTotalFileCount() {
            if (!store.rawData) return;
            let total = 0;
            const contents = getFolderContents();
            for (const key in contents) total += contents[key].length;
            totalFileCountSpan.textContent = total;
        }

        function cascadeSelectionDown(folderId, isSelected) {
            getChildrenFolders(folderId).forEach(f => {
                if (isSelected) store.selectedItems.add(`folder:${f.id}`);
                else store.selectedItems.delete(`folder:${f.id}`);
                cascadeSelectionDown(f.id, isSelected);
            });
            getFiles(folderId).forEach(file => {
                if (isSelected) store.selectedItems.add(`file:${file.conversationId}`);
                else store.selectedItems.delete(`file:${file.conversationId}`);
            });
        }

        function evaluateFolderSelection() {
            const checkFolder = (folderId) => {
                const subfolders = getChildrenFolders(folderId);
                const files = getFiles(folderId);

                if (subfolders.length === 0 && files.length === 0) return store.selectedItems.has(`folder:${folderId}`);

                let allSelected = true;
                for (const sub of subfolders) if (!checkFolder(sub.id)) allSelected = false;
                for (const file of files) if (!store.selectedItems.has(`file:${file.conversationId}`)) allSelected = false;

                const folderKey = `folder:${folderId}`;
                if (allSelected && !store.selectedItems.has(folderKey)) store.selectedItems.add(folderKey);
                else if (!allSelected && store.selectedItems.has(folderKey)) store.selectedItems.delete(folderKey);
                return allSelected;
            };
            getChildrenFolders(null).forEach(f => checkFolder(f.id));
        }

        function updateSelectionBadge() {
            let fileCount = 0;
            store.selectedItems.forEach(itemKey => { if (itemKey.startsWith('file:')) fileCount++; });
            fileCountSpan.textContent = fileCount;
            clearSelectionBtn.disabled = store.selectedItems.size === 0;
        }

        function clearSelection() {
            store.selectedItems.clear();
            updateSelectionBadge();
            renderMainContent();
        }

        function getTopLevelSelectedItems() {
            let topLevelItems = [];
            store.selectedItems.forEach(itemKey => {
                const [type, id] = itemKey.split(':');
                let parentId = findSourceId(type, id);
                let isAncestorSelected = false;
                while (parentId) {
                    if (store.selectedItems.has(`folder:${parentId}`)) { isAncestorSelected = true; break; }
                    parentId = findSourceId('folder', parentId);
                }
                if (!isAncestorSelected) topLevelItems.push({ type, id, sourceId: findSourceId(type, id) });
            });
            return topLevelItems;
        }

        function renderAll() {
            if (!store.rawData) return;
            updateNavButtons();
            renderSidebar();
            renderMainContent();
        }

        function renderSidebar() {
            sidebar.innerHTML = '';
            const rootWrapper = document.createElement('div');
            rootWrapper.className = 'tree-node';

            const rootItem = document.createElement('div');
            rootItem.className = `tree-item ${store.currentFolderId === null ? 'active' : ''}`;

            const rootContent = document.createElement('div');
            rootContent.className = 'tree-item-content';
            rootContent.innerHTML = `<span class="tree-icon">🏠</span> 根目录`;

            const rootActions = document.createElement('div');
            rootActions.className = 'tree-item-actions';
            const rootAddBtn = document.createElement('button');
            rootAddBtn.className = 'tree-action-btn';
            rootAddBtn.title = '新建文件夹';
            rootAddBtn.innerHTML = '➕';
            rootAddBtn.onclick = (e) => { e.stopPropagation(); promptCreateFolder(null); };
            rootActions.appendChild(rootAddBtn);

            rootItem.appendChild(rootContent);
            rootItem.appendChild(rootActions);

            rootItem.ondragover = handleDragOver;
            rootItem.ondragleave = handleDragLeave;
            rootItem.ondrop = (e) => { e.stopPropagation(); handleDrop(e, null); };
            rootItem.onclick = () => navigateToFolder(null);

            rootWrapper.appendChild(rootItem);
            sidebar.appendChild(rootWrapper);

            const renderTreeNodes = (parentId, container) => {
                const children = getChildrenFolders(parentId);
                if (children.length === 0) return;

                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'tree-children';
                container.appendChild(childrenContainer);

                children.forEach(folder => {
                    const el = document.createElement('div');
                    el.className = 'tree-node';

                    const item = document.createElement('div');
                    item.className = `tree-item ${store.currentFolderId === folder.id ? 'active' : ''}`;

                    const content = document.createElement('div');
                    content.className = 'tree-item-content';
                    content.innerHTML = `<span class="tree-icon">📁</span> <span class="item-title" title="${escapeHTML(folder.name)}">${escapeHTML(folder.name)}</span>`;

                    const actions = document.createElement('div');
                    actions.className = 'tree-item-actions';

                    const btnUp = document.createElement('button');
                    btnUp.className = 'tree-action-btn';
                    btnUp.title = '上移';
                    btnUp.innerHTML = '↑';
                    btnUp.onclick = (e) => { e.stopPropagation(); reorderFolder(folder.id, 'up'); };

                    const btnDown = document.createElement('button');
                    btnDown.className = 'tree-action-btn';
                    btnDown.title = '下移';
                    btnDown.innerHTML = '↓';
                    btnDown.onclick = (e) => { e.stopPropagation(); reorderFolder(folder.id, 'down'); };

                    const btnAdd = document.createElement('button');
                    btnAdd.className = 'tree-action-btn';
                    btnAdd.title = '新建子文件夹';
                    btnAdd.innerHTML = '➕';
                    btnAdd.onclick = (e) => { e.stopPropagation(); promptCreateFolder(folder.id); };

                    actions.appendChild(btnUp);
                    actions.appendChild(btnDown);
                    actions.appendChild(btnAdd);

                    item.appendChild(content);
                    item.appendChild(actions);

                    item.ondragover = handleDragOver;
                    item.ondragleave = handleDragLeave;
                    item.ondrop = (e) => { e.stopPropagation(); handleDrop(e, folder.id); };
                    item.onclick = (e) => { e.stopPropagation(); navigateToFolder(folder.id); };

                    el.appendChild(item);
                    childrenContainer.appendChild(el);
                    renderTreeNodes(folder.id, el);
                });
            };
            renderTreeNodes(null, rootWrapper);
        }

        function renderMainContent() {
            contentGrid.innerHTML = '';
            let itemsToRender = [];
            const breadcrumbCount = document.getElementById('breadcrumbCount'); // 获取新增的计数标签

            if (store.searchQuery) {
                breadcrumbText.textContent = `搜索结果: "${store.searchQuery}"`;
                const q = store.searchQuery.toLowerCase();
                getFolders().forEach(f => { if (f.name.toLowerCase().includes(q)) itemsToRender.push({ type: 'folder', data: f }); });
                Object.entries(getFolderContents()).forEach(([fId, files]) => {
                    files.forEach(file => { if (file.title.toLowerCase().includes(q)) itemsToRender.push({ type: 'file', data: file, parentId: fId }); });
                });

                // 核心修改：在搜索结果模式下，计算并显示找到了多少个文件夹和文件
                const folderCount = itemsToRender.filter(i => i.type === 'folder').length;
                const fileCount = itemsToRender.filter(i => i.type === 'file').length;
                breadcrumbCount.textContent = `(${folderCount} 个文件夹, ${fileCount} 个文件)`;

            } else {
                if (store.currentFolderId === null) breadcrumbText.textContent = '根目录';
                else {
                    const f = getFolderById(store.currentFolderId);
                    breadcrumbText.textContent = f ? `📁 ${f.name}` : '未知目录';
                }
                getChildrenFolders(store.currentFolderId).forEach(f => itemsToRender.push({ type: 'folder', data: f }));
                getFiles(store.currentFolderId).forEach(file => itemsToRender.push({ type: 'file', data: file, parentId: store.currentFolderId }));

                // 核心修改：在常规浏览模式下，递归计算并显示包含子目录在内的所有文件总数
                const totalRecursiveFiles = getRecursiveFileCount(store.currentFolderId);
                breadcrumbCount.textContent = `(共 ${totalRecursiveFiles} 个文件)`;
            }

            if (itemsToRender.length === 0) contentGrid.innerHTML = `<div class="empty-state">此文件夹为空</div>`;

            itemsToRender.forEach(item => {
                const isFolder = item.type === 'folder';
                const id = isFolder ? item.data.id : item.data.conversationId;
                const title = isFolder ? item.data.name : item.data.title;
                const date = new Date(isFolder ? item.data.createdAt : item.data.addedAt).toLocaleDateString();
                const itemIdKey = `${item.type}:${id}`;
                const isSelected = store.selectedItems.has(itemIdKey);

                const parentIdForPath = isFolder ? item.data.parentId : item.parentId;
                const pathHtml = store.searchQuery ? `<div class="item-path" title="${escapeHTML(getFolderPath(parentIdForPath))}">${escapeHTML(getFolderPath(parentIdForPath))}</div>` : '';

                const metaJsonString = escapeHTML(JSON.stringify(item.data));
                const jumpLinkHtml = (!isFolder && item.data.url) ? `<a href="${item.data.url}" target="_blank" class="action-icon" title="在浏览器中打开">↗️</a>` : '';
                const metaBtnHtml = `<button class="action-icon" title="查看JSON元数据" onclick='openMetaModal(event, ${JSON.stringify(item.data).replace(/'/g, "&apos;")})'>{}</button>`;

                let chatBtnHtml = '';
                if (!isFolder) {
                    const assoc = store.chatAssociations[id];
                    const isImported = !!assoc;
                    const statusClass = isImported ? 'imported' : 'not-imported';
                    const statusTitle = isImported ? '查看对话记录' : '导入对话记录';
                    chatBtnHtml = `<button class="action-icon chat-import-btn ${statusClass}" title="${statusTitle}" onclick="handleChatClick(event, '${id}', '${escapeHTML(title)}')">💬</button>`;
                }

                const card = document.createElement('div');
                card.className = `item-card ${isSelected ? 'selected' : ''}`;
                card.draggable = true;

                card.innerHTML = `
                <div class="checkbox-wrapper">
                    <input type="checkbox" value="${itemIdKey}" ${isSelected ? 'checked' : ''}>
                </div>
                <div class="item-header">
                    <div class="item-icon ${item.type}" title="${isFolder ? '点击进入文件夹' : '点击打开对话'}">${isFolder ? '📁' : '📄'}</div>
                </div>
                <div class="item-title-wrapper">
                    <div class="item-title" title="${escapeHTML(title)}">${escapeHTML(title)}</div>
                    <div class="icon-group">
                        ${chatBtnHtml}
                        ${metaBtnHtml}
                        ${jumpLinkHtml}
                    </div>
                </div>
                <div class="item-meta">
                    <div>${date}</div>
                    ${pathHtml}
                </div>
            `;

                if (isFolder) {
                    card.ondragover = handleDragOver;
                    card.ondragleave = handleDragLeave;
                    card.ondrop = (e) => { e.stopPropagation(); handleDrop(e, id); };
                }

                card.ondragstart = (e) => {
                    let dragPayload = [];
                    if (store.selectedItems.has(itemIdKey)) dragPayload = getTopLevelSelectedItems();
                    else dragPayload.push({ type: item.type, id: id, sourceId: isFolder ? item.data.parentId : item.parentId });
                    e.dataTransfer.setData('text/plain', JSON.stringify(dragPayload));
                };

                const checkbox = card.querySelector('input');
                const toggleCheckbox = () => {
                    checkbox.checked = !checkbox.checked;
                    if (checkbox.checked) store.selectedItems.add(itemIdKey);
                    else store.selectedItems.delete(itemIdKey);

                    if (isFolder) cascadeSelectionDown(id, checkbox.checked);
                    evaluateFolderSelection();
                    updateSelectionBadge();
                    renderMainContent();
                };

                checkbox.onclick = (e) => {
                    e.stopPropagation();
                    checkbox.checked = !checkbox.checked;
                    toggleCheckbox();
                };

                card.onclick = (e) => {
                    if (e.target.tagName.toLowerCase() === 'input' ||
                        e.target.closest('a') ||
                        e.target.closest('button') ||
                        e.target.closest('.item-icon')) return;

                    toggleCheckbox();
                };

                const iconEl = card.querySelector('.item-icon');
                iconEl.onclick = (e) => {
                    e.stopPropagation();
                    if (isFolder) {
                        navigateToFolder(id); // 删除了限制条件
                    } else {
                        if (item.data.url) window.open(item.data.url, '_blank');
                    }
                };

                card.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (!store.selectedItems.has(itemIdKey)) {
                        store.selectedItems.clear();
                        store.selectedItems.add(itemIdKey);
                        if (isFolder) cascadeSelectionDown(id, true);
                        evaluateFolderSelection();
                        updateSelectionBadge();
                        renderMainContent();
                    }
                    showContextMenu(e.clientX, e.clientY);
                };

                contentGrid.appendChild(card);
            });

            updateSelectionBadge();
        }

        // --- 弹窗与拖拽逻辑 ---
        function openMetaModal(event, dataObj) {
            event.stopPropagation();
            let jsonStr = JSON.stringify(dataObj, null, 2);
            jsonStr = jsonStr.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const highlighted = jsonStr.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'meta-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) { cls = 'meta-key'; }
                    else { cls = 'meta-string'; }
                } else if (/true|false/.test(match)) { cls = 'meta-boolean'; }
                return '<span class="' + cls + '">' + match + '</span>';
            });
            document.getElementById('metaContent').innerHTML = highlighted;
            document.getElementById('metaModal').style.display = 'flex';
        }

        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over'); }

        function handleDrop(e, targetFolderId) {
            e.preventDefault();
            e.stopPropagation();
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            try {
                const payload = JSON.parse(e.dataTransfer.getData('text/plain'));
                if (Array.isArray(payload)) {
                    payload.forEach(data => moveItem(data.type, data.id, data.sourceId, targetFolderId));
                    store.selectedItems.clear();
                    updateTotalFileCount();
                    updateSelectionBadge();
                    renderAll();
                }
            } catch (err) { console.error("Drop failed:", err); }
        }

        function isDescendant(potentialDescendantId, ancestorId) {
            let currentParentId = getFolderById(potentialDescendantId)?.parentId;
            while (currentParentId) {
                if (currentParentId === ancestorId) return true;
                currentParentId = getFolderById(currentParentId)?.parentId;
            }
            return false;
        }

        function moveItem(type, id, sourceFolderId, targetFolderId) {
            if (sourceFolderId === targetFolderId) return;

            if (type === 'folder') {
                if (id === targetFolderId) return;
                if (targetFolderId && isDescendant(targetFolderId, id)) {
                    alert("非法操作：不能将文件夹移动到它的子文件夹中！");
                    return;
                }
                const folderIndex = store.rawData.data.folders.findIndex(f => f.id === id);
                if (folderIndex > -1) {
                    store.rawData.data.folders[folderIndex].parentId = targetFolderId;
                    store.rawData.data.folders[folderIndex].updatedAt = Date.now();
                }
            } else if (type === 'file') {
                if (!store.rawData.data.folderContents[targetFolderId]) store.rawData.data.folderContents[targetFolderId] = [];
                const sourceArr = store.rawData.data.folderContents[sourceFolderId] || [];
                const fileIndex = sourceArr.findIndex(f => f.conversationId === id);
                if (fileIndex > -1) {
                    const [fileObj] = sourceArr.splice(fileIndex, 1);
                    store.rawData.data.folderContents[targetFolderId].push(fileObj);
                }
            }
        }

        function showContextMenu(x, y) {
            contextMenu.style.display = 'block';
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
        }
        document.addEventListener('click', () => { contextMenu.style.display = 'none'; });

        document.getElementById('contextMoveBtn').onclick = () => {
            if (store.selectedItems.size === 0) return;
            folderSelect.innerHTML = `<option value="null">🏠 根目录</option>`;
            getFolders().forEach(f => folderSelect.innerHTML += `<option value="${f.id}">📁 ${escapeHTML(f.name)}</option>`);
            document.getElementById('moveModal').style.display = 'flex';
        };

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        function confirmMove() {
            const targetId = folderSelect.value === 'null' ? null : folderSelect.value;
            const itemsToMove = getTopLevelSelectedItems();
            itemsToMove.forEach(item => moveItem(item.type, item.id, item.sourceId, targetId));
            closeModal('moveModal');
            store.selectedItems.clear();
            updateSelectionBadge();
            renderAll();
        }

        searchInput.addEventListener('input', (e) => {
            store.searchQuery = e.target.value.trim();
            renderMainContent();
        });

        function exportData() {
            if (!store.rawData) return;
            store.rawData.exportedAt = new Date().toISOString();
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(store.rawData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "gemini-voyager-export.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // =====================================
        // 新增：对话关联与查看系统
        // =====================================
        let currentViewingChatId = null;

        async function handleChatClick(event, id, title) {
            event.stopPropagation();
            const assoc = store.chatAssociations[id];
            if (assoc) {
                // 已导入，查看
                openChatViewer(id, title, assoc);
            } else {
                // 未导入，开始自动/手动导入流程
                try {
                    const res = await fetch(`/api/chat-history/search?title=${encodeURIComponent(title)}`);
                    const data = await res.json();
                    if (data.success && data.matches && data.matches.length > 0) {
                        if (data.matches.length === 1) {
                            // 只有一个匹配，精确或带横杠的匹配，自动关联
                            await confirmAndAssociateChat(id, data.matches[0].name, data.matches[0].type, title, title);
                        } else {
                            // 有多个潜在匹配（如带 (1) 的重命名冲突），打开选择框让用户确认
                            openChatSelectModal(id, title, data.matches);
                        }
                    } else {
                        // 无法自动匹配，打开手动选择模态框，列出所有供搜索
                        openChatSelectModal(id, title, data.all || []);
                    }
                } catch (err) {
                    alert("请求后端搜索失败: " + err.message);
                }
            }
        }

        async function confirmAndAssociateChat(id, entryName, type, uiTitle, newName) {
            try {
                // 如果名字不同，先触发重命名
                if (entryName !== newName) {
                    const res1 = await fetch('/api/chat-history/rename', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ oldName: entryName, newName: newName, type })
                    });
                    const data1 = await res1.json();
                    if (!data1.success) throw new Error(data1.error || "重命名失败");
                    entryName = newName; // 重命名成功后使用新名
                }

                // 保存关联关系
                const res2 = await fetch('/api/associations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conversationId: id, folderName: entryName, type })
                });
                const data2 = await res2.json();
                if (data2.success) {
                    store.chatAssociations[id] = { folderName: entryName, type, importedAt: Date.now() };
                    renderMainContent(); // 刷新 UI 图标状态
                    closeModal('chatSelectModal');
                } else {
                    throw new Error("保存关联失败");
                }
            } catch (err) {
                alert("关联失败: " + err.message);
            }
        }

        let chatSelectItemsData = [];
        let currentBindingChatId = null;
        let currentBindingChatTitle = '';

        function openChatSelectModal(id, title, items) {
            currentBindingChatId = id;
            currentBindingChatTitle = title;
            chatSelectItemsData = items;
            renderChatSelectList(items);
            document.getElementById('chatSelectSearch').value = '';
            document.getElementById('chatSelectModal').style.display = 'flex';
        }

        document.getElementById('chatSelectSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = chatSelectItemsData.filter(i => i.name.toLowerCase().includes(query));
            renderChatSelectList(filtered);
        });

        function renderChatSelectList(items) {
            const list = document.getElementById('chatSelectList');
            list.innerHTML = '';
            if (items.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">未找到匹配的对话记录</div>';
                return;
            }
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'chat-select-item';
                const icon = item.type === 'folder' ? '📁' : '📄';
                const badge = item.type === 'folder' ? '文件夹' : '文件';
                el.innerHTML = `
                <div style="font-size: 18px;">${icon}</div>
                <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHTML(item.name)}">${escapeHTML(item.name)}</div>
                <div class="chat-type-badge">${badge}</div>
            `;
                el.onclick = () => {
                    if (confirm(`是否确认将该记录重命名为：\n"${currentBindingChatTitle}"\n并关联？`)) {
                        confirmAndAssociateChat(currentBindingChatId, item.name, item.type, currentBindingChatTitle, currentBindingChatTitle);
                    }
                };
                list.appendChild(el);
            });
        }

        // 解析并显示聊天记录
        async function openChatViewer(id, title, assoc) {
            currentViewingChatId = id;
            document.getElementById('chatViewerTitle').textContent = title;
            document.getElementById('chatViewerDate').textContent = new Date(assoc.importedAt).toLocaleString();
            document.getElementById('chatViewerTurns').textContent = '';
            document.getElementById('chatViewerSource').textContent = '';
            document.getElementById('chatViewerBody').innerHTML = '<div style="text-align:center; padding: 40px;">加载中...</div>';
            document.getElementById('chatViewerModal').style.display = 'flex';

            try {
                const res = await fetch(`/api/chat-history/read?name=${encodeURIComponent(assoc.folderName)}&type=${assoc.type}`);
                const data = await res.json();
                if (data.success) {
                    parseAndRenderMarkdown(data.content, data.basePath);
                } else {
                    document.getElementById('chatViewerBody').innerHTML = `<div style="text-align:center; padding: 40px; color: red;">加载失败: ${escapeHTML(data.error)}</div>`;
                }
            } catch (err) {
                document.getElementById('chatViewerBody').innerHTML = `<div style="text-align:center; padding: 40px; color: red;">网络错误: ${err.message}</div>`;
            }
        }

        async function removeChatAssociation() {
            if (!currentViewingChatId) return;
            if (confirm("确定解除此对话的关联吗？（不会删除本地文件）")) {
                try {
                    const res = await fetch(`/api/associations/${currentViewingChatId}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        delete store.chatAssociations[currentViewingChatId];
                        renderMainContent();
                        closeModal('chatViewerModal');
                    }
                } catch (err) {
                    alert("解除关联失败: " + err.message);
                }
            }
        }

        // 简单的 Markdown 解析器转气泡 UI 渲染
        function parseAndRenderMarkdown(markdownText, basePath) {
            const bodyEl = document.getElementById('chatViewerBody');
            bodyEl.innerHTML = '';

            let metaTurns = '';
            let metaSourceHtml = '';

            // 预处理匹配 metadata (Date, Turns, Source)
            const topMatch = markdownText.match(/\*\*Date\*\*: (.*?)\n\*\*Turns\*\*: (.*?)\n\*\*Source\*\*: \[(.*?)\]\((.*?)\)/s);
            if (topMatch) {
                // document.getElementById('chatViewerDate').textContent = topMatch[1];
                document.getElementById('chatViewerTurns').textContent = `Turns: ${topMatch[2]}`;
                document.getElementById('chatViewerSource').innerHTML = `Source: <a href="${escapeHTML(topMatch[4])}" target="_blank" style="color:var(--primary)">${escapeHTML(topMatch[3])}</a>`;
            }

            // 拆分 Turns (## Turn X)
            const parts = markdownText.split(/## Turn \d+/);
            // 第一部分是元数据，略过
            for (let i = 1; i < parts.length; i++) {
                const turnText = parts[i];

                const divider = document.createElement('div');
                divider.className = 'chat-turn-divider';
                divider.textContent = `— Turn ${i} —`;
                bodyEl.appendChild(divider);

                // 拆分 User 和 Assistant
                // ### 👤 User
                // ### 🤖 Assistant
                const rolesRegex = /### 👤 User(.*?)### 🤖 Assistant(.*?)$/s;
                const match = turnText.match(rolesRegex);

                let userContent = '';
                let assistantContent = '';

                if (match) {
                    userContent = match[1].trim();
                    assistantContent = match[2].trim();
                } else {
                    // 回退处理
                    if (turnText.includes('### 👤 User')) userContent = turnText.split('### 👤 User')[1].trim();
                    else userContent = turnText.trim();
                }

                if (userContent) {
                    bodyEl.appendChild(createChatBubble('user', userContent, basePath));
                }
                if (assistantContent) {
                    // 直接使用全部内容，避免使用 --- 切断，会破坏表格和正常分隔符
                    let astStr = assistantContent;
                    // 如果确有特征的脚标可以通过特定标识符剔除，但通常直接渲染即可
                    bodyEl.appendChild(createChatBubble('assistant', astStr, basePath));
                }
            }
        }

        function createChatBubble(role, contentMarkdown, basePath) {
            const row = document.createElement('div');
            row.className = `chat-bubble-row ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'chat-bubble-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';

            // 预处理图片路径，使其能够正确映射到后端静态服务
            let processedMarkdown = contentMarkdown.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                let imgUrl = src.trim();
                if (!imgUrl.startsWith('http') && !imgUrl.startsWith('data:')) {
                    imgUrl = `${basePath}/${imgUrl}`;
                }
                return `![${alt}](${imgUrl})`;
            });

            // 使用 marked 彻底解析 Markdown（表格、列表、标题等）
            let htmlContent = '';
            if (typeof marked !== 'undefined') {
                htmlContent = marked.parse(processedMarkdown, { breaks: true });
            } else {
                htmlContent = escapeHTML(processedMarkdown); // Fallback
            }

            bubble.innerHTML = htmlContent;

            // 为解析后的所有图片节点绑定点击新窗口打开事件
            const imgs = bubble.querySelectorAll('img');
            imgs.forEach(img => {
                img.style.cursor = 'pointer';
                img.onclick = () => window.open(img.src, '_blank');
            });

            row.appendChild(avatar);
            row.appendChild(bubble);
            return row;
        }
